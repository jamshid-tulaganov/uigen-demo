stages:
  - validate
  - test
  - build
  - claude-agents

variables:
  NODE_VERSION: "20"

default:
  image: node:${NODE_VERSION}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .next/cache/

# ──────────────────────────────────────
# Stage 1: validate
# ──────────────────────────────────────
lint:
  stage: validate
  script:
    - npm ci
    - npx prisma generate
    - npm run lint
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

typecheck:
  stage: validate
  script:
    - npm ci
    - npx prisma generate
    - npx tsc --noEmit
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

# ──────────────────────────────────────
# Stage 2: test
# ──────────────────────────────────────
unit-tests:
  stage: test
  script:
    - npm ci
    - npx prisma generate
    - npm test -- --reporter=verbose
  coverage: '/All files\s*\|\s*(\d+\.?\d*)\s*\|/'
  artifacts:
    when: always
    reports:
      junit: test-results.xml
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

# ──────────────────────────────────────
# Stage 3: build
# ──────────────────────────────────────
build:
  stage: build
  needs: [lint, typecheck, unit-tests]
  script:
    - npm ci
    - npx prisma generate
    - npx prisma migrate deploy
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

# ══════════════════════════════════════
# Stage 4: Claude Agents (MR only)
#
# Reads agent definitions from:
#   .claude/agents/code-reviewer.md
#   .claude/agents/test-writer.md
#   .claude/agents/documenter.md
#
# + skills from .claude/skills/
# ══════════════════════════════════════

claude-reviewer:
  stage: claude-agents
  image: node:${NODE_VERSION}
  needs: [lint, typecheck, unit-tests]
  before_script:
    - npm ci
    - npx prisma generate
    - npm i -g @anthropic-ai/claude-code
  script:
    - |
      # Read agent definition + security skill from project
      AGENT=$(cat .claude/agents/code-reviewer.md)
      SKILL=$(cat .claude/skills/security-review/CHECKLIST.md)
      DIFF=$(git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD)
      FILES=$(git diff --name-only origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD)

      claude -p "
      $AGENT

      ## Security Checklist (from .claude/skills/security-review/CHECKLIST.md):
      $SKILL

      ## Changed files:
      $FILES

      ## Diff:
      $DIFF
      " --output-format text > review-report.txt
    - cat review-report.txt
    - |
      if grep -q "\[P0\]" review-report.txt; then
        echo "P0 security issue found — blocking merge."
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - review-report.txt
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_IID
  allow_failure: false

claude-tester:
  stage: claude-agents
  image: node:${NODE_VERSION}
  needs: [lint, typecheck, unit-tests]
  before_script:
    - npm ci
    - npx prisma generate
    - npm i -g @anthropic-ai/claude-code
  script:
    - |
      # Read agent + skill from project
      AGENT=$(cat .claude/agents/test-writer.md)
      SKILL=$(cat .claude/skills/test-coverage.md)
      FILES=$(git diff --name-only origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD \
        | grep -E '\.(ts|tsx)$' | grep -v '__tests__' | grep -v '.test.' || true)

      if [ -z "$FILES" ]; then
        echo "No source files changed." > test-coverage-report.txt
        exit 0
      fi

      claude -p "
      $AGENT

      ## Testing patterns (from .claude/skills/test-coverage.md):
      $SKILL

      ## Changed source files:
      $FILES
      " --output-format text > test-coverage-report.txt
    - cat test-coverage-report.txt
  artifacts:
    when: always
    paths:
      - test-coverage-report.txt
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_IID
  allow_failure: true

claude-docs:
  stage: claude-agents
  image: node:${NODE_VERSION}
  needs: [lint, typecheck, unit-tests]
  before_script:
    - npm ci
    - npx prisma generate
    - npm i -g @anthropic-ai/claude-code
  script:
    - |
      # Read agent + skill from project
      AGENT=$(cat .claude/agents/documenter.md)
      SKILL=$(cat .claude/skills/documentation.md)
      DIFF=$(git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD)
      FILES=$(git diff --name-only origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD)

      claude -p "
      $AGENT

      ## Documentation patterns (from .claude/skills/documentation.md):
      $SKILL

      ## Changed files:
      $FILES

      ## Diff:
      $DIFF
      " --output-format text > docs-report.txt
    - cat docs-report.txt
  artifacts:
    when: always
    paths:
      - docs-report.txt
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_IID
  allow_failure: true
