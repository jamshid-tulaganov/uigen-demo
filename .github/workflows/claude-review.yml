name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    name: "Claude: Review"
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prisma generate

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          allowed_bots: "github-actions[bot]"
          use_sticky_comment: true
          display_report: true
          show_full_output: true
          prompt: |
            Review this PR. Be concise.

            Read .claude/agents/code-reviewer.md and .claude/skills/security-review/CHECKLIST.md.

            Check: missing getSession(), hardcoded secrets, eval(), auth bypass, data leaks, IDOR.

            Format each finding as one line:
            🔴 P0: file:line — issue → DO NOT MERGE
            🟡 P1: file:line — issue
            🔵 P2: file:line — issue

            Tag @${{ github.event.pull_request.user.login || 'author' }}.

            End with either:
            ⛔ DO NOT MERGE (if any P0)
            ✅ APPROVED (if no P0)

      - name: Block merge on P0
        if: always()
        run: |
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number || github.event.issue.number }}/comments --jq '.[] | select(.user.login == "claude[bot]") | .body')
          if echo "$COMMENTS" | grep -q "DO NOT MERGE"; then
            echo "::error::P0 found — merge blocked"
            exit 1
          else
            echo "✅ No P0 — merge allowed"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  claude-docs:
    name: "Claude: Docs"
    needs: claude-review
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prisma generate

      - name: Claude Docs
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          display_report: true
          show_full_output: true
          prompt: |
            Generate docs for this PR. Be concise.

            Read .claude/agents/documenter.md and .claude/skills/documentation.md.

            Output:
            1. Changelog (Added/Changed/Fixed — one line each)
            2. API changes table (if any)
            3. Breaking changes (if any)
