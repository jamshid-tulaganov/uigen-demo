name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    name: "Claude: Review"
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prisma generate

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          allowed_bots: "github-actions[bot]"
          use_sticky_comment: true
          display_report: true
          show_full_output: true
          claude_args: "--max-turns 5 --model claude-sonnet-4-6"
          prompt: |
            Review this PR. Be concise — max 20 lines total.

            Read .claude/agents/code-reviewer.md and .claude/skills/security-review/CHECKLIST.md.

            Check: missing getSession(), hardcoded secrets, eval(), auth bypass, data leaks, IDOR.

            Format:
            🔴 P0: file:line — issue → DO NOT MERGE
            🟡 P1: file:line — issue
            🔵 P2: file:line — issue

            Tag @${{ github.event.pull_request.user.login || 'author' }}.

            End with: ⛔ DO NOT MERGE (if P0) or ✅ APPROVED (if no P0)

      - name: Block merge on P0
        if: always()
        run: |
          PR=${{ github.event.pull_request.number || github.event.issue.number }}
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${PR}/comments --jq '.[] | select(.user.login == "claude[bot]") | .body' 2>/dev/null || echo "")
          if echo "$COMMENTS" | grep -q "DO NOT MERGE"; then
            echo "::error::P0 found — merge blocked"
            exit 1
          else
            echo "✅ No P0 — merge allowed"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  claude-docs:
    name: "Claude: Docs"
    needs: claude-review
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prisma generate

      - name: Claude Docs
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          display_report: true
          show_full_output: true
          claude_args: "--max-turns 3 --model claude-sonnet-4-6"
          prompt: |
            Generate short docs for this PR. Max 15 lines.

            Read .claude/agents/documenter.md and .claude/skills/documentation.md.

            Output:
            ## Changelog
            - Added/Changed/Fixed — one line each

            ## API Changes (if any)
            | Endpoint | Method | Auth | Description |

            ## Breaking Changes
            None / list
