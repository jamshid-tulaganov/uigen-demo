name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: Code Review (Claude Agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prisma generate

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR for security issues.
            Read .claude/agents/code-reviewer.md and .claude/skills/security-review/CHECKLIST.md first.
            Then review the PR diff. Flag missing getSession(), hardcoded secrets, auth bypasses.
          use_sticky_comment: true
          display_report: true
          show_full_output: true
